<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Hifdh Tracker</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#0F2B28; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#F2ECDD; }
  #app { max-width:480px; margin:0 auto; min-height:100vh; padding:0 0 2rem; }
  .serif { font-family: ui-serif, Georgia, Cambria, 'Times New Roman', serif; }
  .card { background:#16332E; border-radius:14px; padding:1.1rem 1.25rem; margin:0 1rem 0.85rem; }
  .accent-new { border-left: 3px solid #C9A227; }
  .accent-recent { border-left: 3px solid #8C4A3A; }
  .accent-old { border-left: 3px solid #5C8B86; }
  .label { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; opacity:0.7; margin:0 0 4px; }
  .val { font-size:18px; font-weight:600; margin:0; }
  .muted { color:#9FB8AE; }
  button.primary {
    background:#C9A227; color:#0F2B28; border:none; border-radius:10px;
    font-weight:700; font-size:15px; padding:0.85rem 1rem; width:100%; cursor:pointer;
  }
  button.primary:active { transform: scale(0.98); }
  button.ghost {
    background:transparent; color:#9FB8AE; border:1px solid #2C4D46; border-radius:10px;
    font-size:13px; padding:0.5rem 0.8rem; cursor:pointer;
  }
  input[type=number], input[type=text] {
    background:#0F2B28; border:1px solid #2C4D46; color:#F2ECDD; border-radius:8px;
    padding:6px 8px; font-size:14px;
  }
  input[type=number] { width:70px; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .recentlist { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .pill { font-size:12px; background:#0F2B28; border:1px solid #2C4D46; border-radius:999px; padding:3px 9px; color:#9FB8AE; }
  details summary { cursor:pointer; color:#9FB8AE; font-size:13px; margin:0 1rem; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================================
   SETUP — fill these in once, then this file is done. See README notes
   at the bottom of this file for step-by-step Supabase setup.
   ========================================================================= */
var SUPABASE_URL = 'PASTE_YOUR_SUPABASE_PROJECT_URL_HERE';       // e.g. https://abcxyz.supabase.co
var SUPABASE_ANON_KEY = 'PASTE_YOUR_SUPABASE_ANON_PUBLIC_KEY_HERE';
/* ========================================================================= */

(function(){

var JUZ_STARTS = [1,22,42,62,82,102,122,142,162,182,202,222,242,262,282,302,322,342,362,382,402,422,442,462,482,502,522,542,562,582];
function juzRange(j){ return [JUZ_STARTS[j-1], j<30 ? JUZ_STARTS[j]-1 : 604]; }

function buildNewSeq(){
  var seq = [{p:69,h:'B'}];
  for (var p=70; p<440; p++){ seq.push({p:p,h:'A'}); seq.push({p:p,h:'B'}); }
  for (var p=446; p<522; p++){ seq.push({p:p,h:'A'}); seq.push({p:p,h:'B'}); } // stop before 522: last 4 Juz start there
  return seq;
}
function buildInitialPool(){
  var pool = [];
  for (var p=1; p<64; p++){ pool.push({p:p,h:'A'}); pool.push({p:p,h:'B'}); }
  pool.push({p:64,h:'A'});
  for (var p=440; p<446; p++){ pool.push({p:p,h:'A'}); pool.push({p:p,h:'B'}); }
  for (var p=522; p<605; p++){ pool.push({p:p,h:'A'}); pool.push({p:p,h:'B'}); } // corrected: last 4 Juz = 522-604
  return pool;
}
function buildRecentSeed(){
  return [{p:69,h:'A'},{p:68,h:'B'},{p:68,h:'A'},{p:67,h:'B'},{p:67,h:'A'},
          {p:66,h:'B'},{p:66,h:'A'},{p:65,h:'B'},{p:65,h:'A'},{p:64,h:'B'}];
}
function label(item){ return 'Page ' + item.p + ' \u00b7 Half ' + item.h; }

var NEW_SEQ = buildNewSeq();
var INITIAL_POOL = buildInitialPool();
var RECENT_SEED = buildRecentSeed();
var TOTAL_NEW = NEW_SEQ.length;
var COMBINED = RECENT_SEED.slice().reverse().concat(NEW_SEQ);
var ALREADY_MEMORISED_HALVES = INITIAL_POOL.length + RECENT_SEED.length;
var TOTAL_HALVES_IN_MUSHAF = 1208;

function poolLength(daysCompleted){ return INITIAL_POOL.length + daysCompleted; }
function getPool(daysCompleted){ return INITIAL_POOL.concat(COMBINED.slice(0, daysCompleted)); }
function getRecentWindow(daysCompleted){ return COMBINED.slice(daysCompleted, daysCompleted + 10); }
function getOldSlice(daysCompleted, pointer, halvesPerDay){
  var pool = getPool(daysCompleted);
  var n = pool.length;
  var out = [];
  for (var i=0; i<halvesPerDay; i++){ out.push(pool[(pointer + i) % n]); }
  return out;
}

function buildNewSeqIndex(){
  var m = {};
  NEW_SEQ.forEach(function(item, idx){ m[item.p+'_'+item.h] = idx; });
  return m;
}
var NEW_SEQ_INDEX = buildNewSeqIndex();

function juzProgress(daysCompleted){
  var out = [];
  for (var j=1;j<=30;j++){
    var range = juzRange(j);
    var start = range[0], end = range[1];
    var total = (end-start+1)*2;
    var done = 0;
    for (var p=start;p<=end;p++){
      ['A','B'].forEach(function(h){
        var key = p+'_'+h;
        if (NEW_SEQ_INDEX.hasOwnProperty(key)){
          if (NEW_SEQ_INDEX[key] < daysCompleted) done++;
        } else { done++; }
      });
    }
    out.push({ juz:j, start:start, end:end, total:total, done:done, pct: done/total });
  }
  return out;
}

function polarToCartesian(cx,cy,r,angleDeg){
  var rad = (angleDeg-90) * Math.PI/180;
  return { x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad) };
}
function describeArc(cx,cy,r,startAngle,endAngle){
  var start = polarToCartesian(cx,cy,r,endAngle);
  var end = polarToCartesian(cx,cy,r,startAngle);
  var largeArc = endAngle-startAngle <= 180 ? '0' : '1';
  return ['M',start.x,start.y,'A',r,r,0,largeArc,0,end.x,end.y].join(' ');
}
function renderJuzDial(daysCompleted){
  var progress = juzProgress(daysCompleted);
  var complete = progress.filter(function(p){ return p.pct >= 0.999; }).length;
  var inProgress = progress.filter(function(p){ return p.pct > 0 && p.pct < 0.999; }).length;
  var remaining = 30 - complete - inProgress;

  var cx=100, cy=100, r=78, sw=16, gap=1.6, slice=360/30;
  var svg = '<svg viewBox="0 0 200 200" style="width:180px;height:180px;">';
  for (var j=1;j<=30;j++){
    var pj = progress[j-1];
    var color = pj.pct >= 0.999 ? '#C9A227' : (pj.pct > 0 ? '#8C4A3A' : '#20433C');
    var a0 = (j-1)*slice + gap/2;
    var a1 = j*slice - gap/2;
    svg += '<path d="' + describeArc(cx,cy,r,a0,a1) + '" stroke="' + color + '" stroke-width="' + sw + '" fill="none" stroke-linecap="round"/>';
  }
  svg += '<text x="100" y="94" text-anchor="middle" font-size="30" font-weight="700" fill="#F2ECDD" font-family="ui-serif,Georgia,serif">' + complete + '/30</text>';
  svg += '<text x="100" y="116" text-anchor="middle" font-size="11" fill="#9FB8AE" letter-spacing="0.5">JUZ COMPLETE</text>';
  svg += '</svg>';

  var html = '<div class="card" style="text-align:center;">';
  html += '<p class="label" style="text-align:left;">Juz progress</p>';
  html += '<div style="display:flex;justify-content:center;margin:4px 0 8px;">' + svg + '</div>';
  html += '<p style="font-size:13px;margin:0;">';
  html += '<span style="color:#C9A227;">\u25cf</span> ' + complete + ' complete &nbsp; ';
  html += '<span style="color:#8C4A3A;">\u25cf</span> ' + inProgress + ' in progress &nbsp; ';
  html += '<span style="color:#5C8B86;">\u25cf</span> ' + remaining + ' remaining</p>';
  html += '<details style="margin-top:10px;text-align:left;"><summary>Per-Juz breakdown</summary>';
  html += '<div style="margin-top:8px;max-height:220px;overflow-y:auto;">';
  progress.forEach(function(pj){
    var pctLabel = Math.round(pj.pct*1000)/10;
    var color = pj.pct >= 0.999 ? '#C9A227' : (pj.pct > 0 ? '#8C4A3A' : '#9FB8AE');
    html += '<div class="row" style="font-size:12px;padding:3px 0;border-bottom:1px solid #1D3B35;">';
    html += '<span>Juz ' + pj.juz + ' <span class="muted">(p.' + pj.start + '\u2013' + pj.end + ')</span></span>';
    html += '<span style="color:' + color + ';font-weight:600;">' + pctLabel + '%</span></div>';
  });
  html += '</div></details></div>';
  return html;
}
var state = { daysCompleted: 0, oldPointer: 0, oldPagesPerDay: 5, log: [] };
var loaded = false;
var saveError = null;
var saving = false;
var configOk = SUPABASE_URL.indexOf('PASTE_YOUR') === -1 && SUPABASE_ANON_KEY.indexOf('PASTE_YOUR') === -1;

function sbHeaders(extra){
  var h = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json'
  };
  if (extra) for (var k in extra) h[k] = extra[k];
  return h;
}

async function dbLoad(){
  var res = await fetch(SUPABASE_URL + '/rest/v1/hifdh_state?id=eq.1&select=*', {
    headers: sbHeaders()
  });
  if (!res.ok) throw new Error('Supabase load error ' + res.status);
  var rows = await res.json();
  if (!rows || rows.length === 0) return null;
  var r = rows[0];
  return {
    daysCompleted: r.days_completed,
    oldPointer: r.old_pointer,
    oldPagesPerDay: r.old_pages_per_day,
    log: r.log || []
  };
}

async function dbSave(candidateState){
  var body = {
    days_completed: candidateState.daysCompleted,
    old_pointer: candidateState.oldPointer,
    old_pages_per_day: candidateState.oldPagesPerDay,
    log: candidateState.log,
    updated_at: new Date().toISOString()
  };
  var res = await fetch(SUPABASE_URL + '/rest/v1/hifdh_state?id=eq.1', {
    method: 'PATCH',
    headers: sbHeaders({ 'Prefer': 'return=minimal' }),
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('Supabase save error ' + res.status);
  return true;
}

async function loadState(attempt){
  attempt = attempt || 1;
  if (!configOk){ loaded = true; render(); return; }
  try {
    var restored = await dbLoad();
    if (restored) state = Object.assign(state, restored);
  } catch(e){
    console.error('load failed (attempt ' + attempt + ')', e);
    if (attempt < 2){ await new Promise(function(r){ setTimeout(r, 500); }); return loadState(attempt+1); }
    saveError = 'Couldn\u2019t reach the database to load your progress. Check your internet connection and reload.';
  }
  loaded = true;
  render();
}

async function trySave(candidateState, attempt){
  attempt = attempt || 1;
  try { return await dbSave(candidateState); }
  catch(e){
    console.error('save failed (attempt ' + attempt + ')', e);
    if (attempt < 2){ await new Promise(function(r){ setTimeout(r, 500); }); return trySave(candidateState, attempt+1); }
    return false;
  }
}

async function commitChange(nextStateFn){
  if (saving) return;
  saving = true; saveError = null; render();
  var candidate = nextStateFn(JSON.parse(JSON.stringify(state)));
  var ok = await trySave(candidate);
  saving = false;
  if (ok) state = candidate;
  else saveError = 'Save failed \u2014 nothing has moved forward. Check your connection and try again.';
  render();
}

function markDone(){
  if (state.daysCompleted >= TOTAL_NEW) return;
  commitChange(function(s){
    var halvesPerDay = s.oldPagesPerDay * 2;
    s.daysCompleted += 1;
    s.oldPointer = (s.oldPointer + halvesPerDay) % poolLength(s.daysCompleted);
    s.log.push(new Date().toISOString().slice(0,10));
    return s;
  });
}
function undoLast(){
  if (state.daysCompleted <= 0) return;
  commitChange(function(s){
    s.daysCompleted -= 1;
    var halvesPerDay = s.oldPagesPerDay * 2;
    var n = poolLength(s.daysCompleted);
    s.oldPointer = ((s.oldPointer - halvesPerDay) % n + n) % n;
    s.log.pop();
    return s;
  });
}
function updatePagesPerDay(v){
  var n = parseInt(v,10);
  if (isNaN(n) || n <= 0) return;
  commitChange(function(s){ s.oldPagesPerDay = n; return s; });
}
function resetAll(){
  if (!confirm('Reset all progress back to Day 1? This cannot be undone.')) return;
  commitChange(function(s){ return { daysCompleted:0, oldPointer:0, oldPagesPerDay:s.oldPagesPerDay, log:[] }; });
}

function render(){
  var app = document.getElementById('app');
  if (!configOk){
    app.innerHTML = '<div style="padding:2rem 1.25rem;">' +
      '<h2 class="serif">Setup needed</h2>' +
      '<p class="muted" style="font-size:14px;">Open this file and fill in SUPABASE_URL and SUPABASE_ANON_KEY near the top ' +
      'of the &lt;script&gt; tag \u2014 see the README notes at the bottom of the file for the 5-minute Supabase setup.</p>' +
      '</div>';
    return;
  }
  if (!loaded){
    app.innerHTML = '<div style="padding:2rem 1.25rem;color:#9FB8AE;">Loading\u2026</div>';
    return;
  }
  var d = state.daysCompleted;
  var done = d >= TOTAL_NEW;
  var newPct = Math.min(100, Math.round((d / TOTAL_NEW) * 1000) / 10);
  var overallPct = Math.min(100, Math.round(((ALREADY_MEMORISED_HALVES + d) / TOTAL_HALVES_IN_MUSHAF) * 1000) / 10);

  var html = '';
  html += '<div style="padding:1.5rem 1.25rem 1rem;">';
  html += '<p class="label" style="margin-bottom:2px;">Hifdh tracker \u00b7 Madinah method</p>';
  html += '<h1 class="serif" style="font-size:26px;margin:0 0 10px;">Day ' + (done ? TOTAL_NEW : d+1) + ' of ' + TOTAL_NEW + '</h1>';
  html += '<div style="background:#0F2B28;border-radius:999px;height:8px;overflow:hidden;">';
  html += '<div style="background:#C9A227;height:100%;width:' + overallPct + '%;"></div></div>';
  html += '<p style="font-size:14px;font-weight:600;margin:8px 0 0;">' + overallPct + '% of the whole Qur\u2019an memorised</p>';
  html += '<p class="muted" style="font-size:12px;margin:2px 0 0;">' + newPct + '% through the new material \u00b7 ' + d + ' days done</p>';
  html += '</div>';

  html += renderJuzDial(d);

  if (saveError){
    html += '<div style="margin:0 1rem 0.85rem;background:#3A1F1F;border:1px solid #7A3B3B;border-radius:10px;padding:0.75rem 1rem;">';
    html += '<p style="color:#F2C4C4;font-size:13px;margin:0;">\u26a0\ufe0f ' + saveError + '</p></div>';
  }

  if (done){
    html += '<div class="card accent-new"><p class="serif" style="font-size:19px;margin:0;">Khatm complete.</p></div>';
  } else {
    var today = NEW_SEQ[d];
    var recent = getRecentWindow(d);
    var halvesPerDay = state.oldPagesPerDay * 2;
    var oldSlice = getOldSlice(d, state.oldPointer, halvesPerDay);
    var oldFirst = oldSlice[0], oldLast = oldSlice[oldSlice.length-1];

    html += '<div class="card accent-new"><p class="label">New \u00b7 sabaq</p><p class="val">' + label(today) + '</p></div>';

    html += '<div class="card accent-recent"><p class="label">Recent \u00b7 last 10 halves</p><div class="recentlist">';
    recent.slice().reverse().forEach(function(r){ html += '<span class="pill">' + label(r) + '</span>'; });
    html += '</div></div>';

    html += '<div class="card accent-old"><p class="label">Old revision \u00b7 manzil rotation</p>';
    html += '<p class="val">' + label(oldFirst) + ' \u2192 ' + label(oldLast) + '</p>';
    html += '<p class="muted" style="font-size:12px;margin:6px 0 0;">' + state.oldPagesPerDay + ' pages/day \u00b7 cycles through everything memorised so far</p></div>';

    html += '<div style="margin:1rem 1rem 0;"><button class="primary" ' + (saving ? 'disabled style="opacity:0.6;"' : '') +
      ' onclick="window.__hifdh.markDone()">' + (saving ? 'Saving\u2026' : 'Mark today done') + '</button></div>';
  }

  html += '<div style="margin:0.75rem 1rem 0;display:flex;gap:8px;"><button class="ghost" onclick="window.__hifdh.undoLast()">Undo last day</button></div>';

  html += '<details style="margin-top:1rem;"><summary>Settings</summary><div class="card" style="margin-top:0.75rem;">';
  html += '<div class="row"><span style="font-size:14px;">Old revision \u2014 pages/day</span>';
  html += '<input type="number" min="1" value="' + state.oldPagesPerDay + '" onchange="window.__hifdh.updatePagesPerDay(this.value)" /></div>';
  html += '<p class="muted" style="font-size:12px;margin:10px 0 0;">Manzil pool is ' + poolLength(d) + ' halves (\u2248' + Math.round(poolLength(d)/2) + ' pages).</p>';
  html += '<div style="margin-top:12px;"><button class="ghost" onclick="window.__hifdh.resetAll()">Reset all progress</button></div>';
  html += '</div></details>';

  app.innerHTML = html;
}

window.__hifdh = { markDone: markDone, undoLast: undoLast, updatePagesPerDay: updatePagesPerDay, resetAll: resetAll };
loadState();
})();
</script>

<!-- =====================================================================
README — one-time setup (about 5 minutes), then delete this comment block

1. Go to https://supabase.com -> sign up free (no credit card) -> "New project".
   Pick any name/region/password, wait ~2 min for it to provision.

2. Open the SQL Editor (left sidebar) -> New query -> paste and run:

   create table hifdh_state (
     id int primary key default 1,
     days_completed int not null default 0,
     old_pointer int not null default 0,
     old_pages_per_day int not null default 5,
     log jsonb not null default '[]',
     updated_at timestamptz default now()
   );
   insert into hifdh_state (id) values (1);

   alter table hifdh_state enable row level security;
   create policy "allow anon read" on hifdh_state for select using (true);
   create policy "allow anon update" on hifdh_state for update using (true);

   Note: this makes the single row readable/writable by anyone who has your
   URL + anon key. Fine for a personal tracker; don't put anything sensitive
   in it, and don't publish the key publicly (e.g. in a public GitHub repo).

3. Project Settings (gear icon) -> API -> copy "Project URL" and the
   "anon public" key.

4. Paste those two values into SUPABASE_URL and SUPABASE_ANON_KEY near the
   top of the <script> tag above.

5. Host this single HTML file anywhere static:
   - Netlify: app.netlify.com/drop -> drag this file in -> instant URL
   - GitHub Pages: push to a repo, enable Pages in repo settings
   - Cloudflare Pages: similar drag-and-drop flow
   Bookmark the resulting URL. That's it — no daily downloads, no codes,
   just open the URL and tap "Mark today done".
===================================================================== -->
</body>
</html>
