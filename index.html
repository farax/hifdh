<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Hifdh Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night-1:#071D19;   /* deepest */
    --night-2:#0B2721;   /* base */
    --panel:#0F2E27;     /* card */
    --panel-hi:#153A31;  /* card raised */
    --line:#1E463C;      /* hairline */
    --gold:#D9A93C;      /* illumination */
    --gold-soft:#E7C670;
    --gold-deep:#A97C24;
    --lapis:#4E7DA0;     /* in-progress */
    --sage:#7FA096;      /* muted text */
    --cream:#F4EBD8;     /* primary text */
    --cream-dim:#D8CEB8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--night-1); }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--cream); line-height:1.5;
    background:
      radial-gradient(120% 80% at 50% -10%, #0E322A 0%, var(--night-1) 60%),
      var(--night-1);
    background-attachment: fixed;
  }
  #app { max-width:460px; margin:0 auto; min-height:100vh; padding:0 0 3rem; position:relative; }
  .amiri { font-family:'Amiri', ui-serif, Georgia, serif; }
  .cormorant { font-family:'Cormorant Garamond', ui-serif, Georgia, serif; }

  .card {
    background:linear-gradient(180deg, var(--panel-hi) 0%, var(--panel) 100%);
    border:1px solid var(--line);
    border-radius:18px; padding:1.15rem 1.3rem; margin:0 1rem 0.9rem;
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 24px -12px rgba(0,0,0,0.6);
  }
  .accent-new    { border-top:2px solid var(--gold); }
  .accent-recent { border-top:2px solid var(--lapis); }
  .accent-old    { border-top:2px solid var(--sage); }

  .label {
    font-size:10.5px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--gold); font-weight:600; margin:0 0 8px;
  }
  .val { font-size:19px; font-weight:600; margin:0; color:var(--cream); }
  .muted { color:var(--sage); }

  button.primary {
    position:relative; overflow:hidden;
    background:linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 55%, var(--gold-deep) 100%);
    color:#20180A; border:none; border-radius:14px;
    font-weight:700; font-size:15px; letter-spacing:0.01em;
    padding:0.95rem 1rem; width:100%; cursor:pointer;
    box-shadow: 0 6px 18px -6px rgba(217,169,60,0.5), 0 1px 0 rgba(255,255,255,0.4) inset;
    transition: transform .12s ease, box-shadow .2s ease;
  }
  button.primary:hover { box-shadow: 0 8px 22px -6px rgba(217,169,60,0.65), 0 1px 0 rgba(255,255,255,0.5) inset; }
  button.primary:active { transform: scale(0.985) translateY(1px); }
  button.primary:disabled { opacity:0.55; cursor:default; }
  button.ghost {
    background:transparent; color:var(--sage); border:1px solid var(--line);
    border-radius:12px; font-size:13px; padding:0.6rem 0.9rem; cursor:pointer;
    transition: border-color .2s, color .2s;
  }
  button.ghost:hover { border-color:var(--sage); color:var(--cream-dim); }
  input[type=number], input[type=text] {
    background:var(--night-2); border:1px solid var(--line); color:var(--cream);
    border-radius:9px; padding:7px 9px; font-size:14px;
  }
  input[type=number] { width:74px; }
  input:focus { outline:none; border-color:var(--gold); }
  .row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .recentlist { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .pill {
    font-size:12px; background:var(--night-2); border:1px solid var(--line);
    border-radius:999px; padding:4px 10px; color:var(--cream-dim);
  }
  .pill.head { border-color:var(--lapis); color:var(--cream); }
  details summary {
    cursor:pointer; color:var(--sage); font-size:12.5px; margin:0 1rem;
    letter-spacing:0.03em; list-style:none;
  }
  details summary::-webkit-details-marker { display:none; }
  details summary::before { content:'\\203A'; margin-right:6px; display:inline-block; transition:transform .2s; }
  details[open] summary::before { transform:rotate(90deg); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade { animation: fadeUp .5s ease both; }
  @media (prefers-reduced-motion: reduce){ .fade { animation:none; } button.primary{ transition:none; } }
</style>
</head>

    out[i+1] = { a:[[n[0],n[1]],[n[2],n[3]]], b:[[n[4],n[5]],[n[6],n[7]]], mid:mid };

function halfContents(page, half){
  var e = HALF_MAP[page];
  if (!e) return '';
  var r = half==='A' ? e.a : e.b;
  var start=r[0], end=r[1];
  if (e.mid) return (half==='A'?'First':'Second') + ' half of ' + fmtRef(start);
  // continuation markers: does this half's start ayah begin on an earlier page/half?
  var contStart = false;
  if (half==='B'){ contStart = (e.a[1][0]===start[0] && e.a[1][1]===start[1]); }
  else { var prev = HALF_MAP[page-1]; if (prev) contStart = (prev.b[1][0]===start[0] && prev.b[1][1]===start[1]); }
  var contEnd = false;
  if (half==='A'){ contEnd = (e.b[0][0]===end[0] && e.b[0][1]===end[1]); }
  else { var nxt = HALF_MAP[page+1]; if (nxt) contEnd = (nxt.a[0][0]===end[0] && nxt.a[0][1]===end[1]); }
  var s = fmtRef(start) + (contStart?' (cont.)':'');
  if (start[0]===end[0] && start[1]===end[1]) return s;
  var e2 = (start[0]===end[0] ? String(end[1]) : fmtRef(end)) + (contEnd?'\u2026':'');
  return s + '\u2013' + e2;
}

function juzProgress(daysCompleted){
  var out = [];
  for (var j=1;j<=30;j++){
    var range = juzRange(j);
    var start = range[0], end = range[1];
    var total = (end-start+1)*2;
    var done = 0;
    for (var p=start;p<=end;p++){
      ['A','B'].forEach(function(h){
        var key = p+'_'+h;
        if (NEW_SEQ_INDEX.hasOwnProperty(key)){
          if (NEW_SEQ_INDEX[key] < daysCompleted) done++;
        } else { done++; }
      });
    }
    out.push({ juz:j, start:start, end:end, total:total, done:done, pct: done/total });
  }
  return out;
}

function polarToCartesian(cx,cy,r,angleDeg){
  var rad = (angleDeg-90) * Math.PI/180;
  return { x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad) };
}
function describeArc(cx,cy,r,startAngle,endAngle){
  var start = polarToCartesian(cx,cy,r,endAngle);
  var end = polarToCartesian(cx,cy,r,startAngle);
  var largeArc = endAngle-startAngle <= 180 ? '0' : '1';
  return ['M',start.x,start.y,'A',r,r,0,largeArc,0,end.x,end.y].join(' ');
}
function renderJuzDial(daysCompleted){
  var progress = juzProgress(daysCompleted);
  var complete = progress.filter(function(p){ return p.pct >= 0.999; }).length;
  var inProgress = progress.filter(function(p){ return p.pct > 0 && p.pct < 0.999; }).length;
  var remaining = 30 - complete - inProgress;

  // current position: the juz of the next new half
  var curJuz = null;
  if (daysCompleted < TOTAL_NEW){
    var nextItem = NEW_SEQ[daysCompleted];
    for (var jj=1; jj<=30; jj++){ var rr=juzRange(jj); if (nextItem.p>=rr[0] && nextItem.p<=rr[1]){ curJuz=jj; break; } }
  }

  var cx=110, cy=110, rRing=88, slice=360/30, gap=3.2;
  var svg = '<svg viewBox="0 0 220 220" style="width:206px;height:206px;">';
  svg += '<defs>'
    + '<linearGradient id="goldSeg" x1="0" y1="0" x2="1" y2="1">'
    + '<stop offset="0" stop-color="#E7C670"/><stop offset="1" stop-color="#C79A34"/></linearGradient>'
    + '</defs>';

  for (var j=1;j<=30;j++){

    var isCur = (j===curJuz);
    var col, w, op;
    if (pj.pct>=0.999){ col='url(#goldSeg)'; w=5; op=1; }
    else if (pj.pct>0){ col='#5A8CB0'; w=5; op=1; }

    if (isCur){

      var mid=(a0+a1)/2;
      var m1=polarToCartesian(cx,cy,rRing+6,mid), m2=polarToCartesian(cx,cy,rRing+10,mid);
      svg += '<line x1="'+m1.x+'" y1="'+m1.y+'" x2="'+m2.x+'" y2="'+m2.y+'" stroke="#D9A93C" stroke-width="1.5" stroke-linecap="round"/>';
    }
  }

  // centre text, no heavy core disc — let it breathe
  svg += '<text x="'+cx+'" y="'+(cy-8)+'" text-anchor="middle" font-size="46" fill="#F4EBD8" font-family="Amiri, serif">'+complete+'</text>';

  var html = '<div class="card fade" style="text-align:center;">';
  html += '<p class="label" style="text-align:left;">The thirty parts</p>';
  html += '<div style="display:flex;justify-content:center;margin:2px 0 6px;">' + svg + '</div>';
  html += '<div style="display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--sage);">';
  html += '<span><span style="color:var(--gold);">\u25c6</span> '+complete+' complete</span>';
  html += '<span><span style="color:var(--lapis);">\u25c6</span> '+inProgress+' begun</span>';
  html += '<span><span style="color:#2A4C43;">\u25c6</span> '+remaining+' ahead</span>';

  html += '<div style="margin-top:10px;max-height:230px;overflow-y:auto;">';

    var pctLabel = Math.round(pj.pct*1000)/10;

  var body = {
    days_completed: candidateState.daysCompleted,
    old_pointer: candidateState.oldPointer,
    old_pages_per_day: candidateState.oldPagesPerDay,
    log: candidateState.log,
    updated_at: new Date().toISOString()
  };
  var res = await fetch(SUPABASE_URL + '/rest/v1/hifdh_state?id=eq.1', {
    method: 'PATCH',
    headers: sbHeaders({ 'Prefer': 'return=minimal' }),
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('Supabase save error ' + res.status);
  return true;
}

async function loadState(attempt){
  attempt = attempt || 1;
  if (!configOk){ loaded = true; render(); return; }
  try {
    var restored = await dbLoad();
    if (restored) state = Object.assign(state, restored);
  } catch(e){
    console.error('load failed (attempt ' + attempt + ')', e);
    if (attempt < 2){ await new Promise(function(r){ setTimeout(r, 500); }); return loadState(attempt+1); }
    saveError = 'Couldn\u2019t reach the database to load your progress. Check your internet connection and reload.';
  }
  loaded = true;
  render();
}

async function trySave(candidateState, attempt){
  attempt = attempt || 1;
  try { return await dbSave(candidateState); }
  catch(e){
    console.error('save failed (attempt ' + attempt + ')', e);
    if (attempt < 2){ await new Promise(function(r){ setTimeout(r, 500); }); return trySave(candidateState, attempt+1); }
    return false;
  }
}

async function commitChange(nextStateFn){
  if (saving) return;
  saving = true; saveError = null; render();
  var candidate = nextStateFn(JSON.parse(JSON.stringify(state)));
  var ok = await trySave(candidate);
  saving = false;
  if (ok) state = candidate;
  else saveError = 'Save failed \u2014 nothing has moved forward. Check your connection and try again.';
  render();
}

function markDone(){
  if (state.daysCompleted >= TOTAL_NEW) return;
  commitChange(function(s){
    var halvesPerDay = s.oldPagesPerDay * 2;
    var pageBefore = NEW_SEQ[s.daysCompleted];
    s.daysCompleted += 1;
    s.oldPointer = (s.oldPointer + halvesPerDay) % poolLength(s.daysCompleted);
    s.log.push({ date: new Date().toISOString().slice(0,10), page: pageBefore.p, half: pageBefore.h, contents: halfContents(pageBefore.p, pageBefore.h) });
    return s;
  });
}
function undoLast(){
  if (state.daysCompleted <= 0) return;
  commitChange(function(s){
    s.daysCompleted -= 1;
    var halvesPerDay = s.oldPagesPerDay * 2;
    var n = poolLength(s.daysCompleted);
    s.oldPointer = ((s.oldPointer - halvesPerDay) % n + n) % n;
    s.log.pop();
    return s;
  });
}
function updatePagesPerDay(v){
  var n = parseInt(v,10);
  if (isNaN(n) || n <= 0) return;
  commitChange(function(s){ s.oldPagesPerDay = n; return s; });
}
function resetAll(){
  if (!confirm('Reset all progress back to Day 1? This cannot be undone.')) return;
  commitChange(function(s){ return { daysCompleted:0, oldPointer:0, oldPagesPerDay:s.oldPagesPerDay, log:[] }; });
}

function render(){
  var app = document.getElementById('app');
  if (!configOk){
    app.innerHTML = '<div style="padding:2rem 1.25rem;">' +
      '<h2 class="serif">Setup needed</h2>' +
      '<p class="muted" style="font-size:14px;">Open this file and fill in SUPABASE_URL and SUPABASE_ANON_KEY near the top ' +
      'of the &lt;script&gt; tag \u2014 see the README notes at the bottom of the file for the 5-minute Supabase setup.</p>' +
      '</div>';
    return;
  }
  if (!loaded){
    app.innerHTML = '<div style="padding:5rem 1.25rem;text-align:center;color:var(--sage);">'
      + '<p class="amiri" style="font-size:22px;color:var(--gold-deep);margin:0;" dir="rtl">\u0628\u0650\u0633\u0652\u0645\u0650 \u0627\u0644\u0644\u0651\u0647\u0650</p>'
      + '<p style="font-size:13px;margin:12px 0 0;">Opening your mushaf\u2026</p></div>';
    return;
  }
  var d = state.daysCompleted;
  var done = d >= TOTAL_NEW;
  var newPct = Math.min(100, Math.round((d / TOTAL_NEW) * 1000) / 10);
  var overallPct = Math.min(100, Math.round(((ALREADY_MEMORISED_HALVES + d) / TOTAL_HALVES_IN_MUSHAF) * 1000) / 10);

  var daysRemaining = TOTAL_NEW - d;
  var html = '';

  // Header
  html += '<div class="fade" style="padding:2rem 1.4rem 0.75rem;text-align:center;">';
  html += '<p style="font-size:26px;margin:0;color:var(--gold-soft);font-family:Amiri,serif;" dir="rtl">\u0631\u0628\u0651\u0650 \u0632\u0650\u062f\u0652\u0646\u0650\u064a \u0639\u0650\u0644\u0652\u0645\u064b\u0627</p>';
  html += '<p class="label" style="margin:6px 0 0;text-align:center;">Hifdh \u00b7 Madani mushaf</p>';
  html += '</div>';

  // Overall meter
  html += '<div class="card fade" style="text-align:center;">';
  html += '<div style="display:flex;align-items:baseline;justify-content:center;gap:6px;">';
  html += '<span class="amiri" style="font-size:46px;line-height:1;color:var(--gold);">' + overallPct + '</span>';
  html += '<span class="amiri" style="font-size:22px;color:var(--gold-deep);">%</span></div>';
  html += '<p class="muted" style="font-size:12.5px;margin:4px 0 12px;">of the whole Qur\u2019an held in memory</p>';
  html += '<div style="height:6px;background:#123029;border-radius:999px;overflow:hidden;position:relative;">';
  html += '<div style="height:100%;width:' + overallPct + '%;background:linear-gradient(90deg,var(--gold-deep),var(--gold-soft));border-radius:999px;box-shadow:0 0 12px rgba(217,169,60,0.5);"></div></div>';
  html += '<div class="row" style="margin-top:12px;">';
  html += '<div style="text-align:left;"><p class="amiri" style="font-size:28px;margin:0;color:var(--cream);">' + daysRemaining + '</p><p class="muted" style="font-size:11px;margin:0;">half-pages remaining</p></div>';
  html += '<div style="text-align:right;"><p class="amiri" style="font-size:28px;margin:0;color:var(--cream);">' + d + '</p><p class="muted" style="font-size:11px;margin:0;">completed of ' + TOTAL_NEW + '</p></div>';
  html += '</div>';
  var validLog = (state.log || []).filter(function(e){ return e && (e.date || typeof e === 'string'); });
  if (validLog.length >= 2 && daysRemaining > 0){
    var firstDate = new Date(typeof validLog[0] === 'string' ? validLog[0] : validLog[0].date);
    var lastDate = new Date(typeof validLog[validLog.length-1] === 'string' ? validLog[validLog.length-1] : validLog[validLog.length-1].date);
    var elapsedCalendarDays = Math.max(1, Math.round((lastDate - firstDate) / 86400000) + 1);
    var rate = d / elapsedCalendarDays;
    if (rate > 0){
      var projectedCalendarDaysLeft = Math.ceil(daysRemaining / rate);
      var projectedDate = new Date(); projectedDate.setDate(projectedDate.getDate() + projectedCalendarDaysLeft);
      var projectedStr = projectedDate.toLocaleDateString(undefined, { year:'numeric', month:'long' });
      html += '<p class="muted" style="font-size:11.5px;margin:12px 0 0;padding-top:10px;border-top:1px solid var(--line);">At your pace so far, in shā\u2019 Allāh you reach the end around <span style="color:var(--cream-dim);">' + projectedStr + '</span>.</p>';
    }
  }
  html += '</div>';

  html += renderJuzDial(d);

  if (saveError){
    html += '<div style="margin:0 1rem 0.85rem;background:#3A2016;border:1px solid #7A4A2B;border-radius:12px;padding:0.8rem 1rem;">';
    html += '<p style="color:#EBC9A6;font-size:13px;margin:0;">' + saveError + '</p></div>';
  }

  if (done){
    html += '<div class="card accent-new fade" style="text-align:center;padding:2rem 1.3rem;">';
    html += '<p class="amiri" style="font-size:34px;margin:0;color:var(--gold-soft);" dir="rtl">\u0627\u0644\u062d\u0645\u062f \u0644\u0644\u0647</p>';
    html += '<p class="cormorant" style="font-size:20px;margin:10px 0 0;color:var(--cream);">The memorisation is complete.</p></div>';
  } else {
    var today = NEW_SEQ[d];
    var recent = getRecentWindow(d);
    var halvesPerDay = state.oldPagesPerDay * 2;
    var oldSlice = getOldSlice(d, state.oldPointer, halvesPerDay);
    var oldFirst = oldSlice[0], oldLast = oldSlice[oldSlice.length-1];

    // Today's lesson — the hero card
    html += '<div class="card accent-new fade" style="position:relative;overflow:hidden;">';
    html += '<svg width="46" height="46" viewBox="0 0 46 46" style="position:absolute;top:0;right:0;opacity:0.5;"><path d="M46 0 L46 46 L0 0 Z" fill="none"/><path d="M46 8 Q30 8 30 24 M46 16 Q38 16 38 24 M46 2 Q22 2 22 26" stroke="#B98B2C" stroke-width="0.75" fill="none" opacity="0.6"/><circle cx="38" cy="8" r="1.5" fill="#D9A93C"/></svg>';
    html += '<div class="row"><p class="label" style="margin:0;">Today\u2019s new lesson</p><span class="muted" style="font-size:11px;">' + label(today) + '</span></div>';
    html += '<p class="amiri" style="font-size:26px;margin:10px 0 0;color:var(--cream);line-height:1.3;">' + halfContents(today.p, today.h) + '</p>';
    html += '<p class="muted" style="font-size:11px;margin:8px 0 0;">15-line Madani layout \u00b7 split at the ayah nearest each page\u2019s midpoint. \u201c\u2026\u201d means the ayah continues into the next half.</p>';
    html += '</div>';

    // Recent
    html += '<div class="card accent-recent fade"><p class="label">Recent \u00b7 keep these fresh</p><div class="recentlist">';
    recent.slice().reverse().forEach(function(r, i){ html += '<span class="pill' + (i===0?' head':'') + '">' + label(r) + '</span>'; });
    html += '</div></div>';

    // Old revision
    html += '<div class="card accent-old fade"><p class="label">Old revision \u00b7 manzil</p>';
    html += '<p class="cormorant" style="font-size:18px;margin:2px 0 0;color:var(--cream);">' + halfContents(oldFirst.p, oldFirst.h).split('\u2013')[0] + ' \u2192 ' + halfContents(oldLast.p, oldLast.h) + '</p>';
    html += '<p class="muted" style="font-size:11.5px;margin:6px 0 0;">' + label(oldFirst) + ' \u2192 ' + label(oldLast) + ' \u00b7 ' + state.oldPagesPerDay + ' pages a day, rotating through all you\u2019ve secured</p></div>';

    html += '<div style="margin:1.25rem 1rem 0;"><button class="primary" ' + (saving ? 'disabled' : '') +
      ' onclick="window.__hifdh.markDone()">' + (saving ? 'Saving\u2026' : 'Mark today complete') + '</button></div>';
  }

  html += '<div style="margin:0.6rem 1rem 0;display:flex;gap:8px;"><button class="ghost" onclick="window.__hifdh.undoLast()">Undo last day</button></div>';

  html += '<details style="margin-top:1rem;"><summary>Settings</summary><div class="card" style="margin-top:0.75rem;">';
  html += '<div class="row"><span style="font-size:14px;">Old revision \u2014 pages/day</span>';
  html += '<input type="number" min="1" value="' + state.oldPagesPerDay + '" onchange="window.__hifdh.updatePagesPerDay(this.value)" /></div>';
  html += '<p class="muted" style="font-size:12px;margin:10px 0 0;">Manzil pool is ' + poolLength(d) + ' halves (\u2248' + Math.round(poolLength(d)/2) + ' pages).</p>';
  html += '<div style="margin-top:12px;"><button class="ghost" onclick="window.__hifdh.resetAll()">Reset all progress</button></div>';
  html += '</div></details>';

  app.innerHTML = html;
}

window.__hifdh = { markDone: markDone, undoLast: undoLast, updatePagesPerDay: updatePagesPerDay, resetAll: resetAll };
loadState();
})();
</script>

README — one-time setup (about 5 minutes), then delete this comment block

1. Go to https://supabase.com -> sign up free (no credit card) -> "New project".
   Pick any name/region/password, wait ~2 min for it to provision.

2. Open the SQL Editor (left sidebar) -> New query -> paste and run:

   create table hifdh_state (
     id int primary key default 1,
     days_completed int not null default 0,
     old_pointer int not null default 0,
     old_pages_per_day int not null default 5,
     log jsonb not null default '[]',
     last_surah text not null default 'Aal-Imran',
     last_end_ayah int not null default 154,
     updated_at timestamptz default now()
   );
   insert into hifdh_state (id) values (1);

   -- If you already created the table before this update, instead run:
   -- alter table hifdh_state add column last_surah text not null default 'Aal-Imran';
   -- alter table hifdh_state add column last_end_ayah int not null default 154;

   alter table hifdh_state enable row level security;
   create policy "allow anon read" on hifdh_state for select using (true);
   create policy "allow anon update" on hifdh_state for update using (true);

   Note: this makes the single row readable/writable by anyone who has your
   URL + anon key. Fine for a personal tracker; don't put anything sensitive
   in it, and don't publish the key publicly (e.g. in a public GitHub repo).

3. Project Settings (gear icon) -> API -> copy "Project URL" and the
   "anon public" key.

4. Paste those two values into SUPABASE_URL and SUPABASE_ANON_KEY near the
   top of the <script> tag above.

5. Host this single HTML file anywhere static:
   - Netlify: app.netlify.com/drop -> drag this file in -> instant URL
   - GitHub Pages: push to a repo, enable Pages in repo settings
   - Cloudflare Pages: similar drag-and-drop flow
   Bookmark the resulting URL. That's it — no daily downloads, no codes,
   just open the URL and tap "Mark today done".
